name: Lambda Helper Checks

on:
  push:
    branches:
      - main
    paths:
      - "lambda-functions/deploy-status/**"
      - "lambda-functions/trigger-frontend-githubActions/**"
      - ".github/workflows/lambda-helper-checks.yml"
  pull_request:
    paths:
      - "lambda-functions/deploy-status/**"
      - "lambda-functions/trigger-frontend-githubActions/**"
      - ".github/workflows/lambda-helper-checks.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  helper-lambda-test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - lambda-functions/deploy-status
          - lambda-functions/trigger-frontend-githubActions

    defaults:
      run:
        working-directory: ${{ matrix.package_dir }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build
